name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/songpit-upload/**'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/songpit-upload/package-lock.json

      - name: Install and build SPA
        working-directory: web/songpit-upload
        env:
          PAGES_BUILD: '1'
          VITE_STATIC_DEMO: 'true'
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm ci && npm run build:pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/songpit-upload/dist

      - id: deployment
        uses: actions/deploy-pages@v4
