name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  songpit-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/songpit-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/songpit-api/package-lock.json

      - name: Install and test
        run: npm ci && npm test && npm run test:php
